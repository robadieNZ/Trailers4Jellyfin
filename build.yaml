version: 1.0.8.0
name: Trailers4Jellyfin
guid: 7635bf62-6b22-4c4c-9bc7-5d55f0c2bff0
description: >
  Automatically downloads trailers for upcoming and recently released movies
  not in your library, from TMDB/YouTube. Pairs with Cinema Mode to create a
  real cinema experience — random trailers before your movies start.
overview: Cinema-style trailers for movies you haven't seen yet
category: General
owner: robadieNZ
targetAbi: 10.11.0.0
changelog:
  - Fix: use ItemId (not Path) for intros — Jellyfin 10.11 requires trailers to be in a library
  - Fix: exclude macOS ._resource_fork files from trailer selection
  - Add built-in Cinema Mode: plays N trailers before each movie via IIntroProvider (no separate plugin needed)
  - Genre-matching selects trailers that fit the movie's genre (horror→horror, family→family, etc.)
  - Download task saves genre sidecar JSON alongside each trailer for matching
  - New config options: Enable Cinema Mode, Trailers per movie, Match trailers to genre

dotnetProjects:
  - name: Jellyfin.Plugin.Trailers4Jellyfin
    artifact: Jellyfin.Plugin.Trailers4Jellyfin.dll
