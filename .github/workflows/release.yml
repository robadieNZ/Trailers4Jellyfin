name: Publish Release

on:
  push:
    tags:
      - 'v*.*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use a PAT (or the default GITHUB_TOKEN) so the manifest commit can push to main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: |
          dotnet publish \
            Jellyfin.Plugin.Trailers4Jellyfin/Jellyfin.Plugin.Trailers4Jellyfin.csproj \
            --configuration Release \
            --output bin

      - name: Package
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          # Include the plugin DLL plus all third-party dependencies produced by dotnet publish.
          # Exclude Jellyfin/MediaBrowser framework DLLs — the server already has those loaded.
          # Jellyfin isolates plugins in their own AssemblyLoadContext, so bundling deps here
          # is the correct way to ship plugins that have NuGet dependencies.
          DEPS=$(find bin -name "*.dll" \
            | grep -Ev "/(Jellyfin\.|MediaBrowser\.|Microsoft\.|System\.|netstandard|mscorlib)" \
            | tr '\n' ' ')
          zip -j "trailers4jellyfin_${VERSION}.zip" $DEPS

      - name: Checksum
        id: checksum
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          echo "MD5=$(md5sum trailers4jellyfin_${VERSION}.zip | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Update manifest.json
        run: |
          pip install pyyaml --quiet
          python3 update_manifest.py "${{ steps.version.outputs.VERSION }}" "${{ steps.checksum.outputs.MD5 }}"

      - name: Commit manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "chore: update manifest.json for v${{ steps.version.outputs.VERSION }}" || echo "No changes to commit"
          git push origin HEAD:main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            See [CHANGELOG](https://github.com/robadieNZ/Trailers4Jellyfin/blob/main/build.yaml) for details.

            **To install:** Add `https://raw.githubusercontent.com/robadieNZ/Trailers4Jellyfin/main/manifest.json`
            as a plugin repository in Jellyfin → Admin → Plugins → Repositories.
          files: trailers4jellyfin_${{ steps.version.outputs.VERSION }}.zip
