name: Publish Release

on:
  push:
    tags:
      - 'v*.*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use a PAT (or the default GITHUB_TOKEN) so the manifest commit can push to main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: |
          dotnet publish \
            Jellyfin.Plugin.Trailers4Jellyfin/Jellyfin.Plugin.Trailers4Jellyfin.csproj \
            --configuration Release \
            --output bin

      - name: Package
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          # Always include the plugin DLL itself, then all third-party dependencies.
          # Exclude Jellyfin/MediaBrowser framework DLLs — the server already has those loaded.
          # Note: grep -Ev "/(Jellyfin\." would also exclude our own plugin DLL, so we add it
          # explicitly and let the dep scan cover everything else.
          DEPS=$(find bin -name "*.dll" \
            | grep -Ev "/(Jellyfin\.|MediaBrowser\.|Microsoft\.|System\.|netstandard|mscorlib)" \
            | tr '\n' ' ')
          zip -j "trailers4jellyfin_${VERSION}.zip" \
            bin/Jellyfin.Plugin.Trailers4Jellyfin.dll \
            $DEPS

      - name: Checksum
        id: checksum
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          echo "MD5=$(md5sum trailers4jellyfin_${VERSION}.zip | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Update manifest.json and commit to main
        run: |
          pip install pyyaml --quiet
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Switch to the latest main before updating the manifest so there is no
          # rebase conflict when another commit landed on main since the tag was pushed.
          git fetch origin main
          git checkout main
          python3 update_manifest.py "${{ steps.version.outputs.VERSION }}" "${{ steps.checksum.outputs.MD5 }}"
          git add manifest.json
          git commit -m "chore: update manifest.json for v${{ steps.version.outputs.VERSION }}" || echo "No changes to commit"
          git push origin main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            See [CHANGELOG](https://github.com/robadieNZ/Trailers4Jellyfin/blob/main/build.yaml) for details.

            **To install:** Add `https://raw.githubusercontent.com/robadieNZ/Trailers4Jellyfin/main/manifest.json`
            as a plugin repository in Jellyfin → Admin → Plugins → Repositories.
          files: trailers4jellyfin_${{ steps.version.outputs.VERSION }}.zip
